version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: realtime_postgres
    restart: always
    environment:
      POSTGRES_USER: realtime_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: realtime_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: realtime_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
